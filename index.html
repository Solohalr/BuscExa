<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celsia - Consulta de Datos</title>
    <link rel="stylesheet" href="Css/styles.css">
</head>
<body>

    <!-- HEADER CELSIA -->
    <header class="header-celsia">
        <div class="header-content">
            <div class="logo-area">
                <span class="logo-icon">⚡</span>
                <span class="logo-name">CELSIA</span>
            </div>
            <h1>Consulta de Registros</h1>
        </div>
    </header>

    <!-- BUSCADOR CON FILTRO SIMPLIFICADO -->
    <section class="search-section">
        <div class="search-container">
            <!-- FILTRO: Solo 3 opciones -->
            <select id="searchColumn" class="search-filter" disabled>
                <option value="">🔍 Todas las columnas</option>
                <option value="CLIENTE_ID">📌 ID Cliente</option>
                <option value="NUMERO_MEDIDOR">📌 Número Medidor</option>
            </select>
            
            <div class="search-icon">🔍</div>
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Cargando..." 
                disabled
            >
            <span id="resultCount" class="result-count">0 registros</span>
        </div>
        <div id="searchHint" style="max-width:1200px; margin:8px auto 0; font-size:0.8rem; color:#666; text-align:center;">
            💡 Con filtro: búsqueda exacta. Sin filtro: búsqueda parcial.
        </div>
    </section>

    <!-- PANTALLA DE CARGA -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">Conectando con el servidor...</p>
    </div>

    <!-- TABLA DE DATOS -->
    <main class="main-content">
        <div class="table-container">
            <div class="table-header-bar">
                <h2>📋 Resultados</h2>
                <div>
                    <span id="matchCount" style="margin-right:15px; font-size:0.9rem; color:#E35205;"></span>
                    <button class="btn-reset" onclick="resetSearch()">Limpiar</button>
                </div>
            </div>
            <div class="table-scroll">
                <table id="dataTable" class="data-table">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL DETALLE -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalle del Registro</h3>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <div id="detailBody" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn-map" id="btnMap" style="display:none;" onclick="openGoogleMaps()">
                    📍 Ver en Google Maps
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // ================= ESTADO GLOBAL =================
        let currentData = { headers: [], results: [] };
        let latColIndex = -1;
        let lngColIndex = -1;
        let debounceTimer = null;
        
        // Columnas del filtro (deben coincidir EXACTAMENTE con los encabezados del JSON)
        const FILTER_ID_CLIENTE = "CLIENTE_ID";
        const FILTER_NUMERO_MEDIDOR = "NUMERO_MEDIDOR";

        // ================= INICIALIZACIÓN =================
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // Obtener headers del servidor para detectar coordenadas
                const res = await fetch('/api/search?q=');
                const data = await res.json();
                
                currentData.headers = data.headers || [];
                detectCoordinates(currentData.headers);
                setupUI();
                
            } catch (error) {
                console.error('Error al conectar:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="text-align:center;padding:20px;">
                        <h3 style="color:#E35205;">⚠️ Error de conexión</h3>
                        <p>Verifica que Railway esté corriendo</p>
                        <button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;background:#E35205;color:white;border:none;border-radius:4px;cursor:pointer;">Reintentar</button>
                    </div>
                `;
            }
        });

        // ================= DETECTAR COORDENADAS =================
        function detectCoordinates(headers) {
            headers.forEach((h, i) => {
                const hl = h.toLowerCase();
                if ((hl.includes('lat') || hl.includes('cord_y')) && !hl.includes('long')) latColIndex = i;
                if ((hl.includes('lon') || hl.includes('long') || hl.includes('cord_x')) && !hl.includes('lat')) lngColIndex = i;
            });
        }

        // ================= CONFIGURAR UI =================
        function setupUI() {
            // Habilitar controles
            const searchColumn = document.getElementById('searchColumn');
            searchColumn.disabled = false;
            
            const searchInput = document.getElementById('searchInput');
            searchInput.disabled = false;
            searchInput.placeholder = "Buscar (desde 1 carácter)...";
            
            document.getElementById('searchHint').textContent = "✅ Servidor conectado. Búsqueda instantánea.";
            document.getElementById('loading').style.display = 'none';

            // Event listeners
            searchColumn.addEventListener('change', () => performSearch());
            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => performSearch(), 400);
            });
        }

        // ================= REALIZAR BÚSQUEDA =================
        async function performSearch() {
            const term = document.getElementById('searchInput').value.trim();
            const column = document.getElementById('searchColumn').value;
            
            if (!term) {
                resetSearch();
                return;
            }

            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading').querySelector('.loading-text').textContent = "Buscando...";

            try {
                // Construir URL con parámetros
                let url = `/api/search?q=${encodeURIComponent(term)}`;
                if (column) {
                    url += `&column=${encodeURIComponent(column)}`;
                }
                
                const res = await fetch(url);
                const data = await res.json();
                
                currentData.results = data.results || [];
                renderTable(currentData.results, data.headers || currentData.headers);
                
                // Mostrar tipo de búsqueda
                const filterLabel = column ? ` en "${column}" (exacto)` : ' (parcial)';
                document.getElementById('matchCount').textContent = `${data.count} coincidencias${filterLabel}`;
                document.getElementById('resultCount').textContent = `${data.count} resultados`;
                
            } catch (error) {
                console.error('Error en búsqueda:', error);
                alert('Error al buscar. Intenta de nuevo.');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // ================= RENDERIZAR TABLA =================
        function renderTable(results, headers) {
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHead');
            
            tbody.innerHTML = '';
            
            if (thead.innerHTML === "" && headers.length > 0) {
                thead.innerHTML = `<tr><th>#</th>${headers.map(h => `<th>${h}</th>`).join('')}<th>Ver</th></tr>`;
            }

            results.forEach((row, i) => {
                const tr = document.createElement('tr');
                tr.onclick = () => openModal(row, headers);
                
                let html = `<td>${i + 1}</td>`;
                headers.forEach((_, j) => {
                    html += `<td>${row[j] !== undefined ? row[j] : ''}</td>`;
                });
                html += `<td><button class="btn-action">👁️</button></td>`;
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        // ================= ABRIR MODAL =================
        function openModal(row, headers) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('detailBody');
            const btnMap = document.getElementById('btnMap');

            body.innerHTML = headers.map((h, i) => {
                return `<div class="detail-row"><span class="label">${h}:</span><span class="value">${row[i] !== undefined ? row[i] : '-'}</span></div>`;
            }).join('');

            // Mostrar botón de mapa si hay coordenadas válidas
            if (latColIndex >= 0 && lngColIndex >= 0 && row[latColIndex] && row[lngColIndex]) {
                btnMap.style.display = 'block';
                btnMap.onclick = () => {
                    const url = `https://www.google.com/maps/search/?api=1&query=${row[latColIndex]},${row[lngColIndex]}`;
                    window.open(url, '_blank');
                };
            } else {
                btnMap.style.display = 'none';
            }

            modal.classList.remove('hidden');
        }

        // ================= CERRAR MODAL =================
        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // ================= LIMPIAR BÚSQUEDA =================
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchColumn').value = '';
            document.getElementById('tableBody').innerHTML = '';
            document.getElementById('tableHead').innerHTML = '';
            document.getElementById('matchCount').textContent = '';
            document.getElementById('resultCount').textContent = '0 registros';
            currentData.results = [];
        }

        // ================= CERRAR MODAL AL HACER CLIC FUERA =================
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
