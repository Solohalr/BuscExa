<script>
    // ================= ESTADO GLOBAL =================
    let currentData = { headers: [], results: [] };
    let latColIndex = -1;
    let lngColIndex = -1;
    let debounceTimer = null;
    let idClienteCol = null;  // Columna ID Cliente
    let numeroMedidorCol = null;  // Columna Numero Medidor

    // ================= INICIALIZACIÓN =================
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/search?q=');
            const data = await res.json();
            
            currentData.headers = data.headers || [];
            setupUI(currentData.headers);
            
        } catch (error) {
            console.error('Error al conectar:', error);
            document.getElementById('loading').innerHTML = `
                <div style="text-align:center;padding:20px;">
                    <h3 style="color:#E35205;">⚠️ Error de conexión</h3>
                    <p>Verifica que el servidor esté corriendo</p>
                </div>
            `;
        }
    });

    // ================= CONFIGURAR UI =================
    function setupUI(headers) {
        const searchColumn = document.getElementById('searchColumn');
        searchColumn.innerHTML = ''; // Limpiar opciones duplicadas
        
        // Opción 1: Todas las columnas
        const optAll = document.createElement('option');
        optAll.value = '';
        optAll.textContent = '🔍 Todas las columnas';
        searchColumn.appendChild(optAll);
        
        // Buscar columnas específicas
        headers.forEach(h => {
            const hl = h.toLowerCase();
            
            // Detectar ID Cliente
            if (hl.includes('cliente') && hl.includes('id')) {
                idClienteCol = h;
            }
            
            // Detectar Numero Medidor
            if (hl.includes('medidor') || hl.includes('numero_medidor')) {
                numeroMedidorCol = h;
            }
            
            // Detectar coordenadas
            if ((hl.includes('lat') || hl.includes('cord_y')) && !hl.includes('long')) latColIndex = headers.indexOf(h);
            if ((hl.includes('lon') || hl.includes('long') || hl.includes('cord_x')) && !hl.includes('lat')) lngColIndex = headers.indexOf(h);
        });
        
        // Agregar opciones específicas si existen
        if (idClienteCol) {
            const optId = document.createElement('option');
            optId.value = idClienteCol;
            optId.textContent = `📌 ID Cliente`;
            searchColumn.appendChild(optId);
        }
        
        if (numeroMedidorCol) {
            const optMed = document.createElement('option');
            optMed.value = numeroMedidorCol;
            optMed.textContent = `📌 Número Medidor`;
            searchColumn.appendChild(optMed);
        }

        // Habilitar controles
        searchColumn.disabled = false;
        const searchInput = document.getElementById('searchInput');
        searchInput.disabled = false;
        searchInput.placeholder = "Buscar (desde 1 carácter)...";
        
        document.getElementById('searchHint').textContent = "✅ Servidor conectado. Búsqueda instantánea.";
        document.getElementById('loading').style.display = 'none';

        // Event listeners
        searchColumn.addEventListener('change', () => performSearch());
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => performSearch(), 400);
        });
    }

    // ================= REALIZAR BÚSQUEDA =================
    async function performSearch() {
        const term = document.getElementById('searchInput').value.trim();
        const column = document.getElementById('searchColumn').value;
        
        if (!term) {
            resetSearch();
            return;
        }

        document.getElementById('loading').style.display = 'flex';
        document.getElementById('loading').querySelector('.loading-text').textContent = "Buscando...";

        try {
            const url = `/api/search?q=${encodeURIComponent(term)}${column ? `&column=${encodeURIComponent(column)}` : ''}`;
            const res = await fetch(url);
            const data = await res.json();
            
            currentData.results = data.results || [];
            renderTable(currentData.results, data.headers || currentData.headers);
            
            const filterLabel = column ? ` en "${column}" (exacto)` : ' (parcial)';
            document.getElementById('matchCount').textContent = `${data.count} coincidencias${filterLabel}`;
            document.getElementById('resultCount').textContent = `${data.count} resultados`;
            
        } catch (error) {
            console.error('Error en búsqueda:', error);
            alert('Error al buscar. Intenta de nuevo.');
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // ================= RENDERIZAR TABLA =================
    function renderTable(results, headers) {
        const tbody = document.getElementById('tableBody');
        const thead = document.getElementById('tableHead');
        
        tbody.innerHTML = '';
        
        if (thead.innerHTML === "" && headers.length > 0) {
            thead.innerHTML = `<tr><th>#</th>${headers.map(h => `<th>${h}</th>`).join('')}<th>Ver</th></tr>`;
        }

        results.forEach((row, i) => {
            const tr = document.createElement('tr');
            tr.onclick = () => openModal(row, headers);
            
            let html = `<td>${i + 1}</td>`;
            headers.forEach((_, j) => {
                html += `<td>${row[j] !== undefined ? row[j] : ''}</td>`;
            });
            html += `<td><button class="btn-action">👁️</button></td>`;
            
            tr.innerHTML = html;
            tbody.appendChild(tr);
        });
    }

    // ================= ABRIR MODAL =================
    function openModal(row, headers) {
        const modal = document.getElementById('detailModal');
        const body = document.getElementById('detailBody');
        const btnMap = document.getElementById('btnMap');

        body.innerHTML = headers.map((h, i) => {
            return `<div class="detail-row"><span class="label">${h}:</span><span class="value">${row[i] !== undefined ? row[i] : '-'}</span></div>`;
        }).join('');

        if (latColIndex >= 0 && lngColIndex >= 0 && row[latColIndex] && row[lngColIndex]) {
            btnMap.style.display = 'block';
            btnMap.onclick = () => {
                const url = `https://www.google.com/maps/search/?api=1&query=${row[latColIndex]},${row[lngColIndex]}`;
                window.open(url, '_blank');
            };
        } else {
            btnMap.style.display = 'none';
        }

        modal.classList.remove('hidden');
    }

    // ================= CERRAR MODAL =================
    function closeModal() {
        document.getElementById('detailModal').classList.add('hidden');
    }

    // ================= LIMPIAR BÚSQUEDA =================
    function resetSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchColumn').value = '';
        document.getElementById('tableBody').innerHTML = '';
        document.getElementById('tableHead').innerHTML = '';
        document.getElementById('matchCount').textContent = '';
        document.getElementById('resultCount').textContent = '0 registros';
        currentData.results = [];
    }

    // ================= CERRAR MODAL AL HACER CLIC FUERA =================
    window.onclick = function(event) {
        const modal = document.getElementById('detailModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
